name: CI Dagger Pipeline
on: [push, pull_request]

jobs:
  go-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Dagger Pipeline
        run: go run ./dagger/ci/main.go
      
      - name: Verify Go Modules are Tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::Go modules are not tidy! Please run 'go mod tidy' locally."
            exit 1
          fi