name: Dagger Docs
on: [push, pull_request]

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Dagger Docs Generator
        run: go run ./dagger/docs/main.go
        
      - name: Verify Documentation is Up-to-Date
        run: |
          if ! git diff --exit-code; then
            echo "::error::Documentation is out of date!"
            echo "Please run 'go run ./dagger/docs/main.go' locally and commit the changes."
            exit 1
          fi